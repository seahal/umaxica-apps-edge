packages:
  - app/apex
  - app/core
  - app/docs
  - app/news
  - com/apex
  - com/core
  - org/apex
  - org/core
  - dev/core
  - net/apex

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.13
  vite-plus: ^0.1.14
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.14

ignoredBuiltDependencies:
  - '@sentry/cli'
  - esbuild
  - sharp
  - unrs-resolver
  - workerd

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
  - oxlint
  - '@oxlint/*'
  - oxfmt
  - '@oxfmt/*'

overrides:
  fast-xml-parser: '>=5.5.7'
  rolldown: '1.0.0-rc.10'
  undici: '>=7.24.0'
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
