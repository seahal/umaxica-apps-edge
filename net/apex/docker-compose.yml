name: 'umaxica-net'

services:
  dev:
    build:
      context: ..
      dockerfile: Dockerfile
      target: development
      args:
        - DOCKER_UID=${UID:-1000}
        - DOCKER_GID=${GID:-1000}
        - DOCKER_USER=apex
        - DOCKER_GROUP=group
    working_dir: /home/apex/workspace/net/apex
    volumes:
      - type: bind
        source: ..
        target: /home/apex/workspace
        consistency: cached
      - type: volume
        source: node-modules
        target: /home/apex/workspace/net/node_modules
        volume:
          nocopy: true
      - type: volume
        source: bun-cache
        target: /home/apex/.bun
        volume:
          nocopy: true
    ports:
      - '8787:8787'
    environment:
      - CLOUDFLARE_ENV=development
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=4096
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
      - ALL_PROXY
      - http_proxy
      - https_proxy
      - no_proxy
      - all_proxy
    command: vp run server
    tty: true
    stdin_open: true
    init: true
    user: apex:group
    restart: unless-stopped

  build:
    build:
      context: ..
      dockerfile: Dockerfile
      target: development
      args:
        - DOCKER_UID=${UID:-1000}
        - DOCKER_GID=${GID:-1000}
        - DOCKER_USER=apex
        - DOCKER_GROUP=group
    working_dir: /home/apex/workspace/net/apex
    volumes:
      - type: bind
        source: ..
        target: /home/apex/workspace
        consistency: cached
      - type: volume
        source: node-modules
        target: /home/apex/workspace/net/node_modules
        volume:
          nocopy: true
      - type: volume
        source: bun-cache
        target: /home/apex/.bun
        volume:
          nocopy: true
    environment:
      - NODE_ENV=production
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
      - ALL_PROXY
      - http_proxy
      - https_proxy
      - no_proxy
      - all_proxy
    command: vp run build
    user: apex:group
    profiles:
      - build

  wrangler:
    build:
      context: ..
      dockerfile: Dockerfile
      target: development
      args:
        - DOCKER_UID=${UID:-1000}
        - DOCKER_GID=${GID:-1000}
        - DOCKER_USER=apex
        - DOCKER_GROUP=group
    working_dir: /home/apex/workspace/net/apex
    volumes:
      - type: bind
        source: ..
        target: /home/apex/workspace
        consistency: cached
      - type: volume
        source: node-modules
        target: /home/apex/workspace/net/node_modules
        volume:
          nocopy: true
      - type: volume
        source: bun-cache
        target: /home/apex/.bun
        volume:
          nocopy: true
    ports:
      - '8787:8787'
    environment:
      - CLOUDFLARE_ENV=development
      - NODE_ENV=development
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
      - ALL_PROXY
      - http_proxy
      - https_proxy
      - no_proxy
      - all_proxy
    command: vp exec wrangler dev --config wrangler.jsonc --ip 0.0.0.0 --port 8787
    tty: true
    stdin_open: true
    init: true
    user: apex:group
    restart: unless-stopped
    profiles:
      - wrangler

volumes:
  node-modules:
    driver: local
  bun-cache:
    driver: local
