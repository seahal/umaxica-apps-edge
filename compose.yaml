name: umaxica-apps-edge

services:
  core:
    build:
      context: .
      args:
        - DOCKER_UID=${UID:-1000}
        - DOCKER_GID=${GID:-1000}
        - DOCKER_USER=edge
        - DOCKER_GROUP=group
    working_dir: /home/edge/workspace
    volumes:
      - type: bind
        source: .
        target: /home/edge/workspace
        consistency: cached
      - type: volume
        source: node-volume
        target: /home/edge/workspace/node_modules
        volume:
          nocopy: true
    ports:
      - '5101:5101' # com/apex
      - '5102:5102' # com/post
      - '5201:5201' # net/apex
      - '5301:5301' # org/apex
      - '5302:5302' # org/post
      - '5401:5401' # app/apex
      - '5402:5402' # app/post
    command: sleep infinity
    tty: true
    stdin_open: true
    init: true
    user: edge:group
    environment:
      - CLOUDFLARE_ENV=development
      - VITE_GIT_HOOKS=0
      - NODE_OPTIONS=--max-old-space-size=4096
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: umaxica_post_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d umaxica_post_development']
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
  rails:
    build:
      context: ./rails
    working_dir: /rails
    volumes:
      - type: bind
        source: ./rails
        target: /rails
        consistency: cached
      - type: volume
        source: bundle-volume
        target: /usr/local/bundle
        volume:
          nocopy: true
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: umaxica_post_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: bash -lc "bundle install && bin/rails db:prepare && bin/rails server -b 0.0.0.0 -p 3001"
    restart: unless-stopped
volumes:
  node-volume:
    driver: local
  bundle-volume:
    driver: local
  postgres-data:
    driver: local
