name: umaxica-apps-edge

services:
  core:
    build:
      context: .
      args:
        - DOCKER_UID=${UID:-1000}
        - DOCKER_GID=${GID:-1000}
        - DOCKER_USER=edge
        - DOCKER_GROUP=group
    working_dir: /home/edge/workspace
    volumes:
      - type: bind
        source: .
        target: /home/edge/workspace
        consistency: cached
      - type: volume
        source: node-volume
        target: /home/edge/workspace/node_modules
        volume:
          nocopy: true
    ports:
      - '5102:5102' # com/core
      - '5106:5106' # com/post
      - '5302:5302' # org/core
      - '5306:5306' # org/post
      - '5402:5402' # app/core
      - '5406:5406' # app/post
    command: sleep infinity
    tty: true
    stdin_open: true
    init: true
    user: edge:group
    environment:
      - CLOUDFLARE_ENV=development
      - VITE_GIT_HOOKS=0
      - NODE_OPTIONS=--max-old-space-size=4096
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: umaxica_post_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - type: volume
        source: postgres-data
        target: /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d umaxica_post_development']
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
volumes:
  node-volume:
    driver: local
  postgres-data:
    driver: local
