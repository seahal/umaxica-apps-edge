pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,json,jsonc,yaml,yml,md,mdx}'
      run: pnpm exec oxfmt {staged_files}
      stage_fixed: true
    lint:
      glob: '*.{js,jsx,ts,tsx}'
      run: pnpm exec oxlint {staged_files}

pre-push:
  commands:
    typecheck:
      run: pnpm run typecheck
    test:
      run: pnpm run test
